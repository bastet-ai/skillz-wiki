site_name: Skillz Wiki
site_description: Recon skills and replayable exploit-path notes for authorized pentesting and red-team work
site_author: Bastet.ai Security Team
site_url: https://skillz.wiki/

repo_name: bastet-ai/skillz-wiki
repo_url: https://github.com/bastet-ai/skillz-wiki

theme:
  name: material
  custom_dir: overrides
  features:
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.tracking
    - search.highlight
    - search.share
    - toc.integrate
    - content.code.copy

plugins:
  - search:
      lang: en
  - awesome-pages
  - git-revision-date-localized:
      type: date
  - minify:
      minify_html: true
  - mermaid2

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.betterem:
      smart_enable: all
  - pymdownx.caret
  - pymdownx.mark
  - pymdownx.tilde
  - pymdownx.keys
  - pymdownx.critic
  - pymdownx.tasklist:
      custom_checkbox: true
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - toc:
      permalink: true
  - tables

nav:
  - Home: index.md
  - Skills:
      - Overview: skills/index.md
      - HTTP Probing with httpx: skills/httpx.md
      - DNS Enumeration: skills/dns-enumeration.md
      - Nmap Scanning: skills/nmap-scanning.md
  - Recon:
      - Overview: methodology/overview.md
      - Reconnaissance: methodology/reconnaissance.md
      - Large-Scale Reconnaissance: methodology/large-scale-reconnaissance.md
      - Client-Side Analysis: methodology/client-side-analysis.md
  - Exploit Paths:
      - CORS Credential Abuse: methodology/cors-vulnerability-analysis.md
      - OAuth Token Theft: methodology/oauth-token-theft.md
      - OAuth Misconfigs for MCP / Agents: methodology/oauth-mcp-misconfig.md
      - CVE Reversing: methodology/cve-reversing-web-vulnerabilities.md
  - Templates:
      - Vulnerability Report: report-templates/vulnerability-report.md
  - Notes:
      - How to use this wiki: notes/how-to-use.md
      - Source index: notes/source-index.md
      - Editorial checklist: notes/editorial-checklist.md
  - Blog:
      - Overview: blog/index.md
      - Launching Skillz Wiki: blog/2026-03-26-skillz-wiki-launch.md

extra_css:
  - stylesheets/extra.css
