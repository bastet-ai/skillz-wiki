      - CISA KEV: alerts/cisa-kev.md
      - Trivy Embedded Malicious Code: alerts/2026-03-26-trivy-embedded-malicious-code-cve-2026-33634.md
      - Langflow Code Injection: alerts/2026-03-25-langflow-code-injection-cve-2026-33017.md
      - Laravel Livewire Code Injection: alerts/2026-03-20-laravel-livewire-code-injection-cve-2025-54068.md
      - Craft CMS Code Injection: alerts/2026-03-20-craftcms-code-injection-cve-2025-32432.md
  - Skills:
      - Overview: skills/index.md
      - DNS Enumeration: skills/dns-enumeration.md
      - Nmap Scanning: skills/nmap-scanning.md
  - Playbooks:
      - Overview: methodology/overview.md
      - Client-Side Analysis: methodology/client-side-analysis.md
      - CORS Vulnerability Analysis: methodology/cors-vulnerability-analysis.md
      - Large-Scale Reconnaissance: methodology/large-scale-reconnaissance.md
      - Reconnaissance: methodology/reconnaissance.md
      - DNS Enumeration: methodology/dns-enumeration.md
      - Nmap Scanning: methodology/nmap-scanning.md
      - CVE Reversing: methodology/cve-reversing-web-vulnerabilities.md
      - Vulnerability Assessment: methodology/vulnerability-assessment.md
      - OAuth Token Theft: methodology/oauth-token-theft.md
      - OAuth Misconfigs for MCP/Agents: methodology/oauth-mcp-misconfig.md
      - Exploitation: methodology/exploitation.md
      - Post-Exploitation: methodology/post-exploitation.md
  - Tools:
